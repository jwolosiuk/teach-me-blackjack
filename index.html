<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blackjack Trainer</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #161b22;
      --surface-2: #1f242c;
      --border: #2a313c;
      --text: #e6edf3;
      --muted: #7d8590;
      --good: #3fb950;
      --good-bg: rgba(63, 185, 80, 0.14);
      --good-border: rgba(63, 185, 80, 0.35);
      --bad: #f85149;
      --bad-bg: rgba(248, 81, 73, 0.12);
      --bad-border: rgba(248, 81, 73, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    }

    /* ---------- header ---------- */
    .header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 14px 24px 6px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .stat .value {
      font-size: 24px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* ---------- table area ---------- */
    .table {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      padding: 8px 24px;
    }
    .zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .zone-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .zone.player .zone-label {
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0.02em;
      text-transform: none;
      font-weight: 500;
    }
    .cards {
      display: flex;
      gap: 10px;
    }

    /* ---------- cards ---------- */
    .card {
      width: 72px;
      height: 100px;
      border-radius: 10px;
      background: #fafafa;
      color: #1a1a1a;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.45);
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      animation: dealIn 220ms cubic-bezier(0.3, 0.8, 0.2, 1) backwards;
    }
    .card.red { color: #d3203a; }
    .card .corner {
      font-size: 16px;
      line-height: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .card .corner .suit { font-size: 14px; }
    .card .corner.bot { align-self: flex-end; transform: rotate(180deg); }
    .card .pip {
      font-size: 32px;
      line-height: 1;
      text-align: center;
      align-self: center;
    }

    .card.back {
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 6px, transparent 6px 12px),
        linear-gradient(135deg, #2a3852, #1a2336);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .cards .card:nth-child(2) { animation-delay: 70ms; }
    .cards .card:nth-child(3) { animation-delay: 140ms; }

    @keyframes dealIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ---------- footer (feedback + actions) ---------- */
    .footer {
      padding: 0 20px calc(16px + env(safe-area-inset-bottom));
    }
    .feedback-slot {
      min-height: 56px;
      display: flex;
      align-items: center;
      padding: 8px 0;
    }
    .feedback {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid transparent;
      animation: feedbackIn 160ms ease-out;
    }
    .feedback[hidden] { display: none; }
    .feedback.good {
      background: var(--good-bg);
      color: var(--good);
      border-color: var(--good-border);
    }
    .feedback.bad {
      background: var(--bad-bg);
      color: var(--bad);
      border-color: var(--bad-border);
    }
    .feedback .icon {
      font-size: 18px;
      font-weight: 700;
    }
    .feedback b { color: inherit; font-weight: 700; }

    @keyframes feedbackIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- actions ---------- */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions button {
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      min-height: 56px;
      padding: 14px;
      cursor: pointer;
      transition: transform 90ms ease, background 160ms ease, border-color 160ms ease;
    }
    .actions button:active { transform: scale(0.97); }
    .actions button.span-2 { grid-column: span 2; }

    .actions button.chosen.good {
      background: var(--good);
      border-color: var(--good);
      color: #0a0e14;
    }
    .actions button.chosen.bad {
      background: var(--bad);
      border-color: var(--bad);
      color: #0a0e14;
    }
    .actions button.reveal:not(.chosen) {
      background: var(--good-bg);
      border-color: var(--good-border);
      color: var(--good);
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="stat"><span class="value" id="accuracy">—</span><span class="label">accuracy</span></div>
      <div class="stat"><span class="value" id="streak">0</span><span class="label">streak</span></div>
      <div class="stat"><span class="value" id="total">0</span><span class="label">hands</span></div>
    </header>

    <section class="table">
      <div class="zone dealer">
        <div class="zone-label">Dealer</div>
        <div class="cards" id="dealer-cards"></div>
      </div>
      <div class="zone player">
        <div class="zone-label" id="hand-label">—</div>
        <div class="cards" id="player-cards"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="feedback-slot">
        <div class="feedback" id="feedback" hidden></div>
      </div>
      <div class="actions" id="actions"></div>
    </footer>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
