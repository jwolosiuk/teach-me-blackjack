<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blackjack Strategy Engine — Tests</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 980px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { margin: 0 0 0.2em; }
    .summary { font-size: 1.3em; margin: 0.4em 0 1.2em; padding: 0.5em 0.8em; border-radius: 4px; }
    .summary.pass { color: #060; background: #e9f7e9; border: 1px solid #b6e0b6; font-weight: bold; }
    .summary.fail { color: #c00; background: #fdecec; border: 1px solid #f3b3b3; font-weight: bold; }
    h2 { margin-top: 1.6em; border-bottom: 1px solid #ccc; padding-bottom: 0.2em; font-size: 1.1em; }
    .test { padding: 0.1em 0.4em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.88em; }
    .test.pass { color: #060; }
    .test.fail { color: #c00; background: #fef0f0; }
    .err { color: #800; margin: 0 0 0.4em 1.6em; font-family: ui-monospace, monospace; font-size: 0.85em; }
    .note { color: #555; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Blackjack Strategy Engine — Tests</h1>
  <p class="note">Rules: 6D · S17 · DAS · LS. Reference: <a href="tests/reference-chart.md">tests/reference-chart.md</a>.</p>
  <div id="output"></div>

  <script type="module">
    import { getOptimalAction, classifyHand, isPair } from './js/strategy.js';
    import { hardTotals, softTotals, pairs, DEALER_UPCARDS } from './js/strategy-table.js';
    import { solveActions, dealerDistribution, handTotal, isSoft, addCard } from './js/solver.js';
    import { evaluateAction } from './js/evaluator.js';

    // --- Tiny harness ---
    const results = [];
    let currentGroup = '';

    function describe(name, fn) {
      const prev = currentGroup;
      currentGroup = name;
      fn();
      currentGroup = prev;
    }
    function it(name, fn) {
      try {
        fn();
        results.push({ group: currentGroup, name, pass: true });
      } catch (e) {
        results.push({ group: currentGroup, name, pass: false, err: e.message });
      }
    }
    function assertEqual(actual, expected, msg) {
      if (actual !== expected) {
        const prefix = msg ? msg + ': ' : '';
        throw new Error(`${prefix}expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
      }
    }
    function assert(cond, msg) {
      if (!cond) throw new Error(msg || 'assertion failed');
    }

    // --- Hand builders ---
    function makeHardHand(total) {
      // Return a 2-card non-pair non-ace hand for totals 5..19. For 20 fall back to 3 cards
      // (since two non-equal cards ≤10 can't sum to 20). Hard 20 cells are all S, so the
      // 3-card limitation doesn't affect the expected action.
      if (total === 20) return [2, 8, 10];
      for (let lo = 2; lo < total - lo; lo++) {
        const hi = total - lo;
        if (hi <= 10 && lo !== hi) return [lo, hi];
      }
      throw new Error(`no hard hand for total ${total}`);
    }
    function makeSoftHand(total) { return [11, total - 11]; }
    function makePairHand(rank) { return rank === 'A' ? [11, 11] : [Number(rank), Number(rank)]; }

    function upcardLabel(u) { return u === 11 ? 'A' : String(u); }

    // Mirror of resolveCell in strategy.js — used only for the chart-sweep expected values.
    function resolveExpected(cell, handSize, lateSurrender) {
      const canAct = handSize === 2;
      if (cell === 'D')  return canAct ? 'D' : 'H';
      if (cell === 'Ds') return canAct ? 'D' : 'S';
      if (cell === 'R')  return (canAct && lateSurrender) ? 'R' : 'H';
      return cell;
    }

    // ========== classifyHand / isPair ==========
    describe('classifyHand / isPair', () => {
      it('hard total, no aces', () => {
        const c = classifyHand([7, 9]);
        assertEqual(c.type, 'hard'); assertEqual(c.total, 16);
      });
      it('soft total, one ace', () => {
        const c = classifyHand([11, 6]);
        assertEqual(c.type, 'soft'); assertEqual(c.total, 17);
      });
      it('two equal cards → pair', () => {
        assertEqual(classifyHand([8, 8]).type, 'pair');
      });
      it('three cards summing pair-like → not pair', () => {
        assertEqual(classifyHand([8, 4, 4]).type, 'hard');
        assertEqual(isPair([8, 8, 2]), false);
      });
      it('A,A → pair, total 22', () => {
        const c = classifyHand([11, 11]);
        assertEqual(c.type, 'pair'); assertEqual(c.total, 22);
      });
      it('soft demotes to hard when bust threatened', () => {
        const c = classifyHand([11, 5, 7]); // 23 → 13 hard
        assertEqual(c.type, 'hard'); assertEqual(c.total, 13);
      });
      it('multi-ace soft (one ace stays at 11)', () => {
        const c = classifyHand([11, 11, 5]); // 27 → 17 soft
        assertEqual(c.type, 'soft'); assertEqual(c.total, 17);
      });
      it('isPair true for [7,7]',   () => assertEqual(isPair([7, 7]), true));
      it('isPair false for [7,8]',  () => assertEqual(isPair([7, 8]), false));
      it('isPair false for 3 cards', () => assertEqual(isPair([5, 5, 5]), false));
    });

    // ========== Chart sweep: hard totals ==========
    describe('hard totals — chart sweep', () => {
      const totals = Object.keys(hardTotals).map(Number).sort((a, b) => a - b);
      for (const total of totals) {
        const hand = makeHardHand(total);
        DEALER_UPCARDS.forEach((upcard, i) => {
          const cell = hardTotals[total][i];
          const expected = resolveExpected(cell, hand.length, true);
          it(`hard ${total} vs ${upcardLabel(upcard)} — hand ${JSON.stringify(hand)}, cell ${cell}, expect ${expected}`, () => {
            assertEqual(getOptimalAction(hand, upcard), expected);
          });
        });
      }
    });

    // ========== Chart sweep: soft totals ==========
    describe('soft totals — chart sweep', () => {
      const totals = Object.keys(softTotals).map(Number).sort((a, b) => a - b);
      for (const total of totals) {
        const hand = makeSoftHand(total);
        DEALER_UPCARDS.forEach((upcard, i) => {
          const cell = softTotals[total][i];
          const expected = resolveExpected(cell, hand.length, true);
          it(`soft ${total} (A,${total - 11}) vs ${upcardLabel(upcard)} — cell ${cell}, expect ${expected}`, () => {
            assertEqual(getOptimalAction(hand, upcard), expected);
          });
        });
      }
    });

    // ========== Chart sweep: pairs ==========
    describe('pairs — chart sweep', () => {
      for (const rank of Object.keys(pairs)) {
        const hand = makePairHand(rank);
        DEALER_UPCARDS.forEach((upcard, i) => {
          const cell = pairs[rank][i];
          const expected = resolveExpected(cell, 2, true);
          it(`pair ${rank},${rank} vs ${upcardLabel(upcard)} — cell ${cell}, expect ${expected}`, () => {
            assertEqual(getOptimalAction(hand, upcard), expected);
          });
        });
      }
    });

    // ========== Edge cases from the spec ==========
    describe('edge cases — pairs', () => {
      DEALER_UPCARDS.forEach(u => {
        it(`A,A vs ${upcardLabel(u)} → P`, () => assertEqual(getOptimalAction([11, 11], u), 'P'));
      });
      it('8,8 vs 10 → P', () => assertEqual(getOptimalAction([8, 8], 10), 'P'));
      it('8,8 vs A  → P', () => assertEqual(getOptimalAction([8, 8], 11), 'P'));
      for (let u = 2; u <= 9; u++) {
        it(`5,5 vs ${u} → D (treat as hard 10)`, () => assertEqual(getOptimalAction([5, 5], u), 'D'));
      }
      it('5,5 vs 10 → H', () => assertEqual(getOptimalAction([5, 5], 10), 'H'));
      it('5,5 vs A  → H', () => assertEqual(getOptimalAction([5, 5], 11), 'H'));
      DEALER_UPCARDS.forEach(u => {
        it(`10,10 vs ${upcardLabel(u)} → S`, () => assertEqual(getOptimalAction([10, 10], u), 'S'));
      });
    });

    describe('edge cases — soft hands', () => {
      it('soft 18 (A,7) vs 9  → H (common error: standing)', () => assertEqual(getOptimalAction([11, 7], 9), 'H'));
      it('soft 18 (A,7) vs 10 → H', () => assertEqual(getOptimalAction([11, 7], 10), 'H'));
      it('soft 18 (A,7) vs A  → H', () => assertEqual(getOptimalAction([11, 7], 11), 'H'));
      DEALER_UPCARDS.forEach(u => {
        it(`soft 17 (A,6) vs ${upcardLabel(u)} ≠ S`, () => {
          const a = getOptimalAction([11, 6], u);
          assert(a !== 'S', `got S for soft 17 vs ${upcardLabel(u)}`);
        });
      });
    });

    describe('edge cases — hard totals & surrender', () => {
      it('hard 16 vs 10 → R', () => assertEqual(getOptimalAction([10, 6], 10), 'R'));
      it('hard 16 vs 9  → R', () => assertEqual(getOptimalAction([10, 6], 9), 'R'));
      it('hard 16 vs A  → R (S17, LS — solver-verified close call)', () => assertEqual(getOptimalAction([10, 6], 11), 'R'));
      it('hard 15 vs 10 → R', () => assertEqual(getOptimalAction([10, 5], 10), 'R'));
      it('hard 15 vs A  → H (S17, no surrender)', () => assertEqual(getOptimalAction([10, 5], 11), 'H'));
      it('hard 12 vs 2 → H (common error: standing)', () => assertEqual(getOptimalAction([4, 8], 2), 'H'));
      it('hard 12 vs 3 → H', () => assertEqual(getOptimalAction([4, 8], 3), 'H'));
    });

    describe('edge cases — doubling and surrender restricted to 2-card hands', () => {
      it('2-card 11 vs 2..10 → D', () => {
        for (let u = 2; u <= 10; u++) {
          assertEqual(getOptimalAction([5, 6], u), 'D', `dealer ${u}`);
        }
      });
      it('2-card 11 vs A → H (S17)', () => assertEqual(getOptimalAction([5, 6], 11), 'H'));
      it('3-card hard 11 vs 6 → H, NOT D', () => assertEqual(getOptimalAction([2, 4, 5], 6), 'H'));
      it('3-card soft 18 vs 4 → S (Ds resolves to S without 2-card)', () => {
        // 2 + 5 + A = 18 soft
        assertEqual(getOptimalAction([2, 5, 11], 4), 'S');
      });
      it('3-card hard 16 vs 10 → H, NOT R', () => assertEqual(getOptimalAction([6, 4, 6], 10), 'H'));
      it('3-card hard 16 vs 9  → H, NOT R', () => assertEqual(getOptimalAction([6, 4, 6], 9), 'H'));
    });

    describe('edge cases — rules parameter', () => {
      it('LS off → hard 16 vs 10 → H', () => {
        assertEqual(getOptimalAction([10, 6], 10, { lateSurrender: false }), 'H');
      });
      it('rules omitted → defaults apply (LS on)', () => {
        assertEqual(getOptimalAction([10, 6], 10), 'R');
      });
      it('total >= 21 always stands (hard 21)', () => assertEqual(getOptimalAction([5, 6, 10], 10), 'S'));
      it('total >= 21 always stands (soft 21)', () => assertEqual(getOptimalAction([11, 5, 5], 6), 'S'));
    });

    // Spot checks: hardcoded against reference-chart.md (one cell per chart section).
    // These are the canonical "human read the markdown" anchors.
    describe('spot checks vs reference-chart.md', () => {
      it('hard 16 vs 10 = R', () => assertEqual(getOptimalAction([10, 6], 10), 'R'));
      it('soft 18 vs 3 = D (cell Ds, 2-card)', () => assertEqual(getOptimalAction([11, 7], 3), 'D'));
      it('pair 9,9 vs 7 = S', () => assertEqual(getOptimalAction([9, 9], 7), 'S'));
    });

    // ========== EV solver ==========
    function approx(a, b, tol) { return Math.abs(a - b) < tol; }

    describe('solver helpers — handTotal / isSoft / addCard', () => {
      it('handTotal [10,5] = 15 hard', () => { assertEqual(handTotal([10,5]), 15); assertEqual(isSoft([10,5]), false); });
      it('handTotal [11,5] = 16 soft', () => { assertEqual(handTotal([11,5]), 16); assertEqual(isSoft([11,5]), true); });
      it('handTotal [11,5,10] = 16 hard (demote)', () => { assertEqual(handTotal([11,5,10]), 16); assertEqual(isSoft([11,5,10]), false); });
      it('handTotal [11,11] = 12 soft', () => { assertEqual(handTotal([11,11]), 12); assertEqual(isSoft([11,11]), true); });
      it('handTotal [11,11,9] = 21 soft (A,A,9)', () => { assertEqual(handTotal([11,11,9]), 21); assertEqual(isSoft([11,11,9]), true); });
      it('addCard 12h+5 → 17h', () => assertEqual(JSON.stringify(addCard(12,false,5)), JSON.stringify({total:17,soft:false})));
      it('addCard 13s+9 → 12h (ace demotes)', () => assertEqual(JSON.stringify(addCard(13,true,9)), JSON.stringify({total:12,soft:false})));
      it('addCard 13s+A → 14s (new ace counts as 1)', () => assertEqual(JSON.stringify(addCard(13,true,11)), JSON.stringify({total:14,soft:true})));
      it('addCard 16h+10 → null (bust)', () => assert(addCard(16,false,10) === null));
      it('addCard 20s+A → 21s', () => assertEqual(JSON.stringify(addCard(20,true,11)), JSON.stringify({total:21,soft:true})));
    });

    // Dealer bust % was validated against a 10M-trial Monte Carlo to ±0.05%.
    // S17, infinite deck, peek excludes BJ for 10 / A upcards.
    describe('solver dealer-outcome distribution', () => {
      const expected = {
        2: 0.354, 3: 0.374, 4: 0.394, 5: 0.416, 6: 0.423,
        7: 0.262, 8: 0.245, 9: 0.228, 10: 0.230, 11: 0.166,
      };
      DEALER_UPCARDS.forEach(up => {
        it(`dist[${upcardLabel(up)}] sums to 1`, () => {
          const d = dealerDistribution(up);
          const s = Object.values(d).reduce((a, b) => a + b, 0);
          assert(approx(s, 1, 1e-9), `sum = ${s}`);
        });
        it(`bust vs ${upcardLabel(up)} ≈ ${(expected[up]*100).toFixed(1)}%`, () => {
          const d = dealerDistribution(up);
          assert(approx(d.bust, expected[up], 0.003), `got ${(d.bust*100).toFixed(2)}%`);
        });
      });
    });

    // The chart is the solver's compiled output: every cell must be the
    // best action the solver picks. 340 cells, full chart sweep.
    describe('solver agrees with chart on every cell', () => {
      function best(ev) {
        let a = null, v = -Infinity;
        for (const k of Object.keys(ev)) if (ev[k] > v) { v = ev[k]; a = k; }
        return a;
      }
      const MAP = { H:'H', S:'S', D:'D', Ds:'D', P:'P', R:'R' };
      function sweep(label, hand, up, cell) {
        it(`${label} vs ${upcardLabel(up)} — chart ${cell}`, () => {
          const got = best(solveActions(hand, up));
          const want = MAP[cell];
          assert(got === want, `solver ${got}, chart ${want}, ev ${JSON.stringify(solveActions(hand,up))}`);
        });
      }
      Object.keys(hardTotals).forEach(t => {
        const hand = makeHardHand(+t);
        DEALER_UPCARDS.forEach((up,i) => sweep(`hard ${t}`, hand, up, hardTotals[t][i]));
      });
      Object.keys(softTotals).forEach(t => {
        const hand = makeSoftHand(+t);
        DEALER_UPCARDS.forEach((up,i) => sweep(`soft ${t}`, hand, up, softTotals[t][i]));
      });
      Object.keys(pairs).forEach(r => {
        const hand = makePairHand(r);
        DEALER_UPCARDS.forEach((up,i) => sweep(`pair ${r},${r}`, hand, up, pairs[r][i]));
      });
    });

    describe('solver EV spot-checks', () => {
      it('stand 20 vs 6 ≈ +0.70', () => {
        const ev = solveActions([10,5,5], 6).S;
        assert(approx(ev, 0.70, 0.02), `got ${ev}`);
      });
      it('R on 16 vs 10 is exactly -0.5', () => {
        assertEqual(solveActions([10,6], 10).R, -0.5);
      });
      it('D on 11 vs 6 is positive and beats hit/stand', () => {
        const ev = solveActions([5,6], 6);
        assert(ev.D > 0 && ev.D > ev.H && ev.D > ev.S, JSON.stringify(ev));
      });
      it('split 8,8 vs 10 beats hit/stand', () => {
        const ev = solveActions([8,8], 10);
        assert(ev.P > ev.H && ev.P > ev.S, JSON.stringify(ev));
      });
      it('split A,A vs A is the best action', () => {
        const ev = solveActions([11,11], 11);
        assert(ev.P > ev.H && ev.P > ev.S, JSON.stringify(ev));
      });
      it('stand on hard 21 vs 6 ≈ +0.92 (dealer can still push at 21)', () => {
        // [5, 6, 10] = 21 hard
        const ev = solveActions([5,6,10], 6);
        assert(approx(ev.S, 0.92, 0.03), `got ${ev.S}`);
      });
    });

    describe('evaluator V3 contract', () => {
      it('R on 16 vs 10 → correct=true, cost=0', () => {
        const r = evaluateAction({ hand: [10,6], upcard: 10, action: 'R', rules: {} });
        assert(r.correct === true && Math.abs(r.cost) < 1e-9, JSON.stringify(r));
      });
      it('H on 16 vs 10 → correct=false, small positive cost', () => {
        const r = evaluateAction({ hand: [10,6], upcard: 10, action: 'H', rules: {} });
        assert(r.correct === false && r.cost > 0 && r.cost < 0.1, JSON.stringify(r));
      });
      it('S instead of D on 11 vs 6 has big cost (>0.3 EV)', () => {
        const r = evaluateAction({ hand: [5,6], upcard: 6, action: 'S', rules: {} });
        assert(r.cost > 0.3, JSON.stringify(r));
      });
      it('chosenEv + cost = optimalEv', () => {
        const r = evaluateAction({ hand: [9,7], upcard: 5, action: 'H', rules: {} });
        assert(approx(r.chosenEv + r.cost, r.optimalEv, 1e-9), JSON.stringify(r));
      });
      it('ev keys = legal actions', () => {
        const r = evaluateAction({ hand: [10,10], upcard: 6, action: 'S', rules: {} });
        const keys = Object.keys(r.ev).sort();
        assertEqual(JSON.stringify(keys), JSON.stringify(['D','H','P','R','S']));
      });
    });

    // --- Render ---
    function render() {
      const out = document.getElementById('output');
      const passed = results.filter(r => r.pass).length;
      const total = results.length;
      const allPass = passed === total;

      const summary = document.createElement('div');
      summary.className = 'summary ' + (allPass ? 'pass' : 'fail');
      summary.textContent = `${passed} / ${total} passed`;
      out.appendChild(summary);

      const groups = {};
      for (const r of results) {
        if (!groups[r.group]) groups[r.group] = [];
        groups[r.group].push(r);
      }
      for (const group of Object.keys(groups)) {
        const rows = groups[group];
        const groupPassed = rows.filter(r => r.pass).length;
        const h = document.createElement('h2');
        h.textContent = `${group} — ${groupPassed} / ${rows.length}`;
        out.appendChild(h);

        const failures = rows.filter(r => !r.pass);
        if (failures.length === 0) {
          const ok = document.createElement('div');
          ok.className = 'test pass';
          ok.textContent = `PASS · all ${rows.length} tests`;
          out.appendChild(ok);
        } else {
          for (const r of failures) {
            const d = document.createElement('div');
            d.className = 'test fail';
            d.textContent = `FAIL · ${r.name}`;
            out.appendChild(d);
            const e = document.createElement('div');
            e.className = 'err';
            e.textContent = r.err;
            out.appendChild(e);
          }
        }
      }
    }
    render();
  </script>
</body>
</html>
