<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Blackjack Trainer</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #161b22;
      --surface-2: #1f242c;
      --border: #2a313c;
      --text: #e6edf3;
      --muted: #7d8590;
      --good: #3fb950;
      --good-bg: rgba(63, 185, 80, 0.14);
      --good-border: rgba(63, 185, 80, 0.35);
      --bad: #f85149;
      --bad-bg: rgba(248, 81, 73, 0.12);
      --bad-border: rgba(248, 81, 73, 0.35);
      --warn: #d2a24c;
      --warn-bg: rgba(210, 162, 76, 0.16);
      --warn-border: rgba(210, 162, 76, 0.4);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      overscroll-behavior-x: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
      user-select: none;
      -webkit-user-select: none;
    }

    /* ---------- mode tabs ---------- */
    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 10px 24px 0;
    }
    .mode-tab {
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      padding: 10px 0 8px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: color 160ms ease, border-color 160ms ease;
    }
    .mode-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    /* ---------- header ---------- */
    .header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 10px 24px 6px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .stat .value {
      font-size: 24px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* ---------- table area ---------- */
    .table {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      padding: 8px 24px;
    }
    .zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .zone-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .zone.player .zone-label {
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0.02em;
      text-transform: none;
      font-weight: 500;
    }
    .cards {
      display: flex;
      gap: 10px;
    }
    .cards.split {
      flex-direction: column;
      gap: 12px;
    }
    .split-hand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 8px;
      border-radius: 12px;
      border: 1px solid transparent;
      transition: border-color 160ms ease, background 160ms ease;
    }
    .split-hand.active {
      border-color: var(--good-border);
      background: var(--good-bg);
    }
    .split-cards .card {
      width: 52px;
      height: 74px;
    }
    .split-cards .card .rank { font-size: 22px; }
    .split-cards .card .suit { font-size: 16px; }
    .split-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* ---------- strategy hint badge ---------- */
    .hand-text { margin-right: 8px; }
    .hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      vertical-align: middle;
      border: 1px solid transparent;
    }
    .hint.fixed {
      color: var(--good);
      background: var(--good-bg);
      border-color: var(--good-border);
    }
    .hint.variable {
      color: var(--warn);
      background: var(--warn-bg);
      border-color: var(--warn-border);
    }

    /* ---------- cards ---------- */
    .card {
      width: 72px;
      height: 100px;
      border-radius: 12px;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.45);
      font-family: inherit;
      animation: dealIn 220ms cubic-bezier(0.3, 0.8, 0.2, 1) backwards;
    }
    .card.red { color: #d3203a; }
    .card .rank {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .card .suit {
      font-size: 22px;
      line-height: 1;
    }

    .card.back {
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 6px, transparent 6px 12px),
        linear-gradient(135deg, #2a3852, #1a2336);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .cards .card:nth-child(2) { animation-delay: 70ms; }
    .cards .card:nth-child(3) { animation-delay: 140ms; }

    @keyframes dealIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ---------- footer (feedback + actions) ---------- */
    .footer {
      padding: 0 20px calc(16px + env(safe-area-inset-bottom));
    }
    .feedback-slot {
      min-height: 56px;
      display: flex;
      align-items: center;
      padding: 8px 0;
    }
    .feedback {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid transparent;
      animation: feedbackIn 160ms ease-out;
    }
    .feedback[hidden] { display: none; }
    .feedback.good {
      background: var(--good-bg);
      color: var(--good);
      border-color: var(--good-border);
    }
    .feedback.bad {
      background: var(--bad-bg);
      color: var(--bad);
      border-color: var(--bad-border);
    }
    .feedback.neutral {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--border);
    }
    .feedback .icon {
      font-size: 18px;
      font-weight: 700;
    }
    .feedback b { color: inherit; font-weight: 700; }
    .feedback .muted-note { opacity: 0.7; font-weight: 400; }

    @keyframes feedbackIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- actions ---------- */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions button {
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      min-height: 56px;
      padding: 14px;
      cursor: pointer;
      transition: transform 90ms ease, background 160ms ease, border-color 160ms ease;
    }
    .actions button:active { transform: scale(0.97); }
    .actions button.span-2 { grid-column: span 2; }

    .actions button.chosen.good {
      background: var(--good);
      border-color: var(--good);
      color: #0a0e14;
    }
    .actions button.chosen.bad {
      background: var(--bad);
      border-color: var(--bad);
      color: #0a0e14;
    }
    .actions button.reveal:not(.chosen) {
      background: var(--good-bg);
      border-color: var(--good-border);
      color: var(--good);
    }

    .version-stamp {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-top: 10px;
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      opacity: 0.6;
    }

    /* ---------- analytics (below the fold) ---------- */
    .scroll-hint {
      appearance: none;
      -webkit-appearance: none;
      display: block;
      width: 100%;
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 0;
      margin-top: 8px;
      cursor: pointer;
      text-align: center;
    }
    .scroll-hint:active { background: var(--surface-2); }
    .scroll-hint::after {
      content: '  ▾';
      display: inline-block;
      animation: hintBounce 1.4s ease-in-out infinite;
    }
    @keyframes hintBounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(3px); }
    }

    .analytics {
      max-width: 480px;
      margin: 0 auto;
      padding: 8px 24px 48px;
      line-height: 1.5;
      font-size: 14.5px;
    }
    .analytics-title {
      font-size: 16px;
      margin: 18px 0 10px;
      letter-spacing: -0.01em;
    }
    .analytics-empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .analytics-overall {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      margin-bottom: 12px;
    }
    .analytics-overall .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .analytics-overall .value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .analytics-overall .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .cat-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cat-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .cat-row.good { border-left-color: var(--good); }
    .cat-row.warn { border-left-color: var(--warn); }
    .cat-row.bad  { border-left-color: var(--bad); }
    .cat-row.neutral { border-left-color: var(--border); }
    .cat-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .cat-name {
      font-weight: 600;
      font-size: 14.5px;
    }
    .cat-stats { display: flex; gap: 14px; }
    .cat-stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .cat-stat .num {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .cat-row.good .cat-stat:nth-child(2) .num,
    .cat-row.good .cat-stat:nth-child(3) .num { color: var(--good); }
    .cat-row.warn .cat-stat:nth-child(2) .num,
    .cat-row.warn .cat-stat:nth-child(3) .num { color: var(--warn); }
    .cat-row.bad  .cat-stat:nth-child(2) .num,
    .cat-row.bad  .cat-stat:nth-child(3) .num { color: var(--bad); }
    .cat-stat .lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .cat-desc {
      margin: 8px 0 0;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="mode-tabs">
      <button class="mode-tab active" type="button" data-mode="practice">Practice</button>
      <button class="mode-tab" type="button" data-mode="play">Play</button>
      <a class="mode-tab" href="concepts.html">Learn</a>
    </nav>

    <header class="header">
      <div class="stat"><span class="value" id="stat-1">—</span><span class="label">accuracy</span></div>
      <div class="stat"><span class="value" id="stat-2">0</span><span class="label">streak</span></div>
      <div class="stat"><span class="value" id="stat-3">0</span><span class="label">hands</span></div>
    </header>

    <section class="table">
      <div class="zone dealer">
        <div class="zone-label" id="dealer-label">Dealer</div>
        <div class="cards" id="dealer-cards"></div>
      </div>
      <div class="zone player">
        <div class="zone-label" id="hand-label">—</div>
        <div class="cards" id="player-cards"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="feedback-slot">
        <div class="feedback" id="feedback" hidden></div>
      </div>
      <div class="actions" id="actions"></div>
      <button class="scroll-hint" type="button" id="scroll-to-stats">your stats</button>
      <div class="version-stamp">—</div>
    </footer>
  </main>

  <section class="analytics" id="analytics"></section>

  <script>
    // Aggressively flush stale clients in case anything ever registered a
    // service worker or stashed something in the cache storage API.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
    }
    if ('caches' in window) {
      caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
    }
  </script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/version.js"></script>
</body>
</html>
