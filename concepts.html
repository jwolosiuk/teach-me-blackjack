<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blackjack · Strategy Guide</title>
  <meta http-equiv="refresh" content="0; url=index.html">
  <script>
    // Learn is now an inline view in index.html. Persist the chosen mode so
    // the user lands directly on Learn after the redirect. Register the
    // no-cache SW too so subsequent loads stay fresh.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    try {
      const raw = localStorage.getItem('blackjack-trainer:v1');
      const data = raw ? JSON.parse(raw) : {};
      data.mode = 'learn';
      localStorage.setItem('blackjack-trainer:v1', JSON.stringify(data));
    } catch {}
    window.location.replace('index.html');
  </script>
</head>
<body>
  <p>Moved — <a href="index.html">go to the app</a>.</p>
</body>
</html>
